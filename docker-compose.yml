# docker-compose.yml
# ------------------
# A convenience wrapper so you can start the whole thing with one command:
#   docker compose up --build
# Then visit http://localhost:8000/docs

services:
  api:
    build: .
    ports:
      - "8000:8000"      # map your computer's port 8000 -> container's port 8000
    volumes:
      - ./models:/app/models   # keep trained model + logs on your machine
    restart: unless-stopped
